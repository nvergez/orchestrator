name: CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]
  # Manual fallback release trigger: forgotten label, superseded queued run,
  # or releasing without a merge. Only releases when dispatched on main.
  workflow_dispatch:

permissions:
  contents: read

# PR runs cancel superseded runs of the same PR; push-to-main and dispatch
# runs are never cancelled (a release run must not die mid-publish).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # The frontend's only test gate in v1 (issue #87): typecheck here,
      # the Vite build via prepack in pack-smoke — its /api/state contract
      # is pinned by the sidecar's HTTP-seam suite.
      - run: npm run typecheck:web

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  # Proves the prepack tsc build, `files` list, and bin wiring end-to-end
  # at PR time instead of at publish time.
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Pack tarball and smoke-test the installed CLI
        run: |
          npm pack
          tarball="$(ls -1 nvergez-orchestrator-*.tgz)"
          prefix="$(mktemp -d)"
          npm install -g --prefix "$prefix" "./$tarball"
          version="$("$prefix/bin/orc" --version)"
          echo "orc --version -> $version"
          test -n "$version"

  # Squash-merge titles become the commits semantic-release reads; a
  # non-conventional title would silently release nothing.
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Releases are label-gated: a merge to main releases only when the merged
  # PR carried the `release` label. The label is a trigger, not a selector —
  # semantic-release ships everything merged since the last tag (see
  # CONTEXT.md "Releasing"). The push event has no PR payload, so this job
  # looks the PR up from the commit SHA.
  check-label:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      release: ${{ steps.label.outputs.release }}
    steps:
      - id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labeled="$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[].labels[].name] | contains(["release"])')"
          echo "release=${labeled:-false}" >> "$GITHUB_OUTPUT"
          echo "release label present: ${labeled:-false}"

  release:
    # Runs on a labeled merge to main, or a manual dispatch on main. A direct
    # push (no PR) never releases; check-label is skipped on dispatch, and its
    # empty output makes the label branch of the condition false.
    if: >-
      ${{
        !cancelled() &&
        needs.typecheck.result == 'success' &&
        needs.lint.result == 'success' &&
        needs.test.result == 'success' &&
        needs.pack-smoke.result == 'success' &&
        (
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
          needs.check-label.outputs.release == 'true'
        )
      }}
    needs: [typecheck, lint, test, pack-smoke, check-label]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release needs full history and tags to find the last release
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # npm >= 11.5.1 is the trusted-publishing (OIDC) floor; Node 22.18
          # bundles npm 10.9.3, so the publish job runs on Node 24.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
