<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!--
      The latin faces the page always paints in, fetched in parallel with the CSS
      instead of after it: `swap` without this flashes the fallback face first.
      Vite hashes both into dist/web/assets — same emitted files the @font-face
      rules point at, no external origin.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="../node_modules/@fontsource-variable/inter/files/inter-latin-wght-normal.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="../node_modules/@fontsource-variable/jetbrains-mono/files/jetbrains-mono-latin-wght-normal.woff2"
    />
    <!-- Inline radar-sweep glyph: no extra request, works offline like everything else here. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23211d18'/%3E%3Ccircle cx='16' cy='16' r='5.5' fill='%235dcbd1'/%3E%3Cpath d='M16 4.5A11.5 11.5 0 0 1 27.5 16' stroke='%235dcbd1' stroke-width='2.5' stroke-linecap='round' fill='none' opacity='.55'/%3E%3C/svg%3E"
    />
    <title>orc · dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
